name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check . --extend-ignore=E402,F401 --line-length=120 || true

      - name: Verify imports
        run: |
          python -c "
            import sys
            sys.path.insert(0, '.')
            modules = ['core.scraper', 'core.analyzer', 'core.exporter',
                       'core.database', 'core.config_manager']
            for m in modules:
                try:
                    __import__(m)
                    print(f'  ✓ {m}')
                except ImportError as e:
                    print(f'  ✗ {m}: {e}')
          "
